#
#-----------------------------
# Main Hyprland Configuration
# -----------------------------

# Monitor (change if needed)
#monitor = eDP-1,1920x1080@60,0x0,1.5
#monitor=eDP-1,preferred,auto,1.25

# Source modular configs
source = ~/.config/hypr/binds.conf
source = ~/.config/hypr/binds-qol.conf
source = ~/.config/hypr/inputs.conf
source = ~/.config/hypr/windows.conf
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/hyprsunset.conf
source = ~/.config/hypr/monitors.conf  #generated by nwg-displays
source = ~/.config/hypr/workspaces.conf  #generated by nwg-displays 
# General settings
general {
    gaps_in = 1
    gaps_out = 2
    border_size = 1
    layout = dwindle
}

# Animations
animations {
    enabled = false
}

# Better graphics for electron apps?
xwayland {

force_zero_scaling = true

}
