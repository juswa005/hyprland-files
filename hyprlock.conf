# ==============================
# GENERAL
# ==============================
general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

# ==============================
# BACKGROUND
# ==============================
background {
    monitor =
    path = ~/.config/hypr/wallpapers/jap.jpg   # change this
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    contrast = 1.1
    brightness = 0.9
    vibrancy = 0.2
    vibrancy_darkness = 0.5
}

# ==============================
# INPUT FIELD (PASSWORD BOX)
# ==============================
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2

    dots_size = 0.2
    dots_spacing = 0.4
    dots_center = true

    outer_color = rgba(255, 255, 255, 0.3)
    inner_color = rgba(0, 0, 0, 0.4)
    font_color = rgba(255, 255, 255, 1.0)

    fade_on_empty = false
    placeholder_text = <span foreground="##cccccc">Enter Password...</span>

    hide_input = false
    rounding = 10

    position = 0, -80
    halign = center
    valign = center
}

# ==============================
# CLOCK
# ==============================
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    font_size = 64
    font_family = JetBrainsMono Nerd Font

    color = rgba(255, 255, 255, 0.9)

    position = 0, 80
    halign = center
    valign = center
}

# ==============================
# DATE
# ==============================
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B %Y')"
    font_size = 18
    font_family = JetBrainsMono Nerd Font

    color = rgba(255, 255, 255, 0.7)

    position = 0, 20
    halign = center
    valign = center
}

# ==============================
# USER
# ==============================
label {
    monitor =
    text = $USER
    font_size = 20
    font_family = JetBrainsMono Nerd Font

    color = rgba(255, 255, 255, 0.8)

    position = 0, -140
    halign = center
    valign = center
}

# ==============================
# STATUS (wrong password, etc.)
# ==============================
label {
    monitor =
    text = $FAIL
    font_size = 14
    font_family = JetBrainsMono Nerd Font

    color = rgba(255, 100, 100, 0.9)

    position = 0, -40
    halign = center
    valign = center
}
