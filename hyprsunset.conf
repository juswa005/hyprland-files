# ~/.config/hypr/hyprsunset.conf

# Enable hyprsunset
enabled = true

# Day temperature (normal screen)
# day_temperature = 6500

# Night temperature (warmer / less blue light)
night_temperature = 4000

# Transition duration in seconds
transition_duration = 10

# Gamma (optional, usually leave at 1.0)
# gamma = 1.0

# Brightness adjustment (1.0 = default)
# brightness = 1.0

# Use automatic location-based sunset/sunrise
auto = false

# If auto = false, you can manually set times:
sunrise = 06:00
sunset = 18:00
