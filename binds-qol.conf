# Extra keybinds that do not overlap with binds.conf

# Focus movement
bind = SUPER CONTROL, LEFT, movefocus, l
bind = SUPER CONTROL, RIGHT, movefocus, r
bind = SUPER CONTROL, UP, movefocus, u
bind = SUPER CONTROL, DOWN, movefocus, d

# Swap tiled windows
bind = SUPER CONTROL SHIFT, LEFT, swapwindow, l
bind = SUPER CONTROL SHIFT, RIGHT, swapwindow, r
bind = SUPER CONTROL SHIFT, UP, swapwindow, u
bind = SUPER CONTROL SHIFT, DOWN, swapwindow, d

# Quick workspace cycling with the mouse wheel
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1
bind = SUPER, Tab, workspace, e+1

# Extra screenshot modes
bind = , PRINT, exec, hyprshot -m output --output-folder ~/Pictures/Screenshots
bind = SHIFT, PRINT, exec, hyprshot -m window --output-folder ~/Pictures/Screenshots

# Media controls
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Extra layout toggles
bind = SUPER ALT, T, pseudo
bind = SUPER SHIFT, P, pin
